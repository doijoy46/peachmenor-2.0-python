<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Collection — {{ app_name | capitalize }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; height: 100%; }

    body {
      background: #000;
      color: #111;
      font-family: 'Helvetica Neue', Helvetica, Arial, 'Inter', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      min-height: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 0;
    }

    /* ── Phone Frame ─────────────────────────────── */
    .phone-frame {
      width: 402px;
      height: min(874px, 95vh);
      background: #fff;
      border-radius: 48px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 0 3px #1a1a1a, 0 0 0 6px #333, 0 20px 60px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
    }

    /* Dynamic Island */
    .phone-frame::before {
      content: '';
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 36px;
      background: #000;
      border-radius: 20px;
      z-index: 200;
    }

    /* ── Nav ──────────────────────────────────────── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 56px 20px 14px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .nav-brand {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #111;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 24px;
      list-style: none;
    }

    .nav-links a {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #555;
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: #111; }
    .nav-links a.active {
      color: #111;
      border-bottom: 1px solid #111;
      padding-bottom: 2px;
    }

    /* ── Upload Section ──────────────────────────── */
    .upload-section {
      padding: 32px 24px 8px;
      text-align: center;
    }

    #file-input { display: none; }

    .upload-btn {
      display: inline-block;
      padding: 13px 36px;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #111;
      background: none;
      border: 1px solid #111;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.3s, color 0.3s;
    }

    .upload-btn:hover { background: #111; color: #fff; }

    .file-count {
      display: none;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #999;
      margin-top: 12px;
    }

    .analyze-btn {
      display: none;
      margin: 12px auto 0;
      padding: 13px 36px;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #fff;
      background: #111;
      border: 1px solid #111;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.3s;
    }

    .analyze-btn:disabled { opacity: 0.4; cursor: default; }

    .upload-loader {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 24px 0;
    }

    .upload-loader.active { display: flex; }

    .success-section {
      display: none;
      text-align: center;
      padding: 24px;
    }

    .success-section.visible { display: block; }

    .success-icon {
      font-size: 28px;
      color: #111;
      margin-bottom: 8px;
    }

    .success-title {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #111;
      margin-bottom: 4px;
    }

    .success-sub {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 2px;
      color: #999;
    }

    /* ── Page Header ─────────────────────────────── */
    .page-header {
      padding: 40px 24px 0;
    }

    .page-title {
      font-size: 36px;
      font-weight: 200;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      color: #111;
      margin-bottom: 8px;
    }

    .page-subtitle {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 32px;
    }

    .page-divider {
      border: none;
      border-top: 1px solid #111;
      margin-bottom: 32px;
    }

    /* ── Loading ──────────────────────────────────── */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 100px 0;
    }

    .spinner {
      width: 20px; height: 20px;
      border: 1.5px solid #eee;
      border-top-color: #111;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-text {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #999;
    }

    /* ── Empty State ──────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 80px 24px;
    }

    .empty-title {
      font-size: 14px;
      font-weight: 300;
      color: #999;
      letter-spacing: 1px;
      margin-bottom: 24px;
    }

    .empty-cta {
      display: inline-block;
      padding: 13px 36px;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #111;
      text-decoration: none;
      border: 1px solid #111;
      transition: background 0.3s, color 0.3s;
    }

    .empty-cta:hover { background: #111; color: #fff; }

    /* ── Collection Content ───────────────────────── */
    .collection {
      padding: 0 24px 48px;
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .collection::-webkit-scrollbar { display: none; }

    /* Job group */
    .job-group {
      margin-bottom: 48px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .job-group.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Crop grid */
    .crops-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .crop-card {
      background: #fff;
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: default;
    }

    .crop-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    }

    .crop-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      background: #f5f5f5;
    }

    .crop-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }

    .crop-card:hover .crop-img-wrap img { transform: scale(1.03); }

    .crop-info {
      padding: 10px 2px 14px;
    }

    .crop-label {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #111;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .crop-conf {
      font-size: 9px;
      font-weight: 300;
      color: #aaa;
      letter-spacing: 1px;
    }

    .crop-meta {
      margin-top: 4px;
      font-size: 10px;
      font-weight: 300;
      color: #777;
      letter-spacing: 0.5px;
      line-height: 1.5;
    }

    .crop-meta-error {
      color: #c55;
      font-style: italic;
    }

    /* ── Siri Orb ───────────────────────────────── */
    .siri-orb {
      position: absolute;
      bottom: 72px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 150;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.6) 0%, transparent 50%),
        radial-gradient(circle at 70% 60%, rgba(120,80,220,0.25) 0%, transparent 50%),
        radial-gradient(circle at 40% 70%, rgba(80,160,240,0.2) 0%, transparent 50%),
        radial-gradient(circle at 60% 30%, rgba(220,120,200,0.15) 0%, transparent 50%),
        linear-gradient(135deg, rgba(200,180,255,0.3), rgba(140,160,255,0.2), rgba(180,140,240,0.25));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 0 24px rgba(140,120,220,0.3),
        0 0 48px rgba(140,120,220,0.12),
        0 2px 8px rgba(0,0,0,0.08),
        inset 0 0 16px rgba(255,255,255,0.35);
      animation: orb-throb 3s ease-in-out infinite;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .siri-orb::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(140,120,220,0.15), transparent 70%);
      animation: orb-glow 3s ease-in-out infinite;
      pointer-events: none;
    }
    .siri-orb::after {
      content: '';
      position: absolute;
      top: 8px;
      left: 12px;
      width: 16px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      filter: blur(4px);
      pointer-events: none;
    }
    .siri-orb:hover {
      transform: translateX(-50%) scale(1.12);
    }
    .siri-orb.active {
      animation: orb-throb-active 1.8s ease-in-out infinite;
      box-shadow:
        0 0 32px rgba(140,120,220,0.45),
        0 0 64px rgba(140,120,220,0.2),
        0 2px 8px rgba(0,0,0,0.1),
        inset 0 0 20px rgba(255,255,255,0.4);
    }
    .siri-orb.recording {
      animation: orb-throb-recording 1s ease-in-out infinite;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.6) 0%, transparent 50%),
        radial-gradient(circle at 70% 60%, rgba(220,80,80,0.3) 0%, transparent 50%),
        radial-gradient(circle at 40% 70%, rgba(240,100,80,0.2) 0%, transparent 50%),
        radial-gradient(circle at 60% 30%, rgba(240,140,140,0.15) 0%, transparent 50%),
        linear-gradient(135deg, rgba(255,180,180,0.3), rgba(255,140,140,0.2), rgba(240,160,160,0.25));
      box-shadow:
        0 0 32px rgba(220,100,100,0.4),
        0 0 64px rgba(220,100,100,0.15),
        0 2px 8px rgba(0,0,0,0.1),
        inset 0 0 20px rgba(255,255,255,0.4);
    }

    @keyframes orb-throb {
      0%, 100% {
        transform: translateX(-50%) scale(1);
        box-shadow: 0 0 24px rgba(140,120,220,0.3), 0 0 48px rgba(140,120,220,0.12), 0 2px 8px rgba(0,0,0,0.08), inset 0 0 16px rgba(255,255,255,0.35);
      }
      50% {
        transform: translateX(-50%) scale(1.06);
        box-shadow: 0 0 32px rgba(140,120,220,0.4), 0 0 60px rgba(140,120,220,0.18), 0 2px 8px rgba(0,0,0,0.08), inset 0 0 20px rgba(255,255,255,0.4);
      }
    }
    @keyframes orb-throb-active {
      0%, 100% {
        transform: translateX(-50%) scale(1.04);
        box-shadow: 0 0 32px rgba(140,120,220,0.45), 0 0 64px rgba(140,120,220,0.2), 0 2px 8px rgba(0,0,0,0.1), inset 0 0 20px rgba(255,255,255,0.4);
      }
      50% {
        transform: translateX(-50%) scale(1.12);
        box-shadow: 0 0 40px rgba(140,120,220,0.55), 0 0 80px rgba(140,120,220,0.25), 0 2px 8px rgba(0,0,0,0.1), inset 0 0 24px rgba(255,255,255,0.45);
      }
    }
    @keyframes orb-throb-recording {
      0%, 100% {
        transform: translateX(-50%) scale(1);
        box-shadow: 0 0 32px rgba(220,100,100,0.4), 0 0 64px rgba(220,100,100,0.15), 0 2px 8px rgba(0,0,0,0.1), inset 0 0 20px rgba(255,255,255,0.4);
      }
      50% {
        transform: translateX(-50%) scale(1.1);
        box-shadow: 0 0 44px rgba(220,100,100,0.55), 0 0 80px rgba(220,100,100,0.25), 0 2px 8px rgba(0,0,0,0.1), inset 0 0 24px rgba(255,255,255,0.45);
      }
    }
    @keyframes orb-glow {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    /* ── Search Popup ───────────────────────────── */
    .search-overlay {
      position: absolute;
      inset: 0;
      z-index: 160;
      background: rgba(0,0,0,0.15);
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 140px;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .search-overlay.visible {
      display: flex;
      opacity: 1;
    }
    .search-popup {
      width: 320px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      transform: translateY(12px);
      transition: transform 0.25s;
    }
    .search-overlay.visible .search-popup {
      transform: translateY(0);
    }
    .search-popup-label {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 12px;
    }
    .search-popup-input {
      width: 100%;
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.5px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
      font-family: inherit;
      color: #111;
      background: #fff;
      transition: border-color 0.2s;
    }
    .search-popup-input:focus { border-color: #111; }
    .search-popup-input::placeholder {
      color: #bbb;
      font-weight: 300;
    }
    .search-popup-status {
      margin-top: 10px;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #c55;
      text-align: center;
      min-height: 16px;
    }
    .search-popup-hint {
      margin-top: 6px;
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 1.5px;
      color: #bbb;
      text-align: center;
    }

    /* ── Outfit Cards ─────────────────────────────── */
    .outfits-grid {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .outfit-card {
      background: #fff;
      border: 1px solid #eee;
      overflow: hidden;
      position: relative;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .outfit-card.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .outfit-collage {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px;
      background: #eee;
    }
    .outfit-collage-item {
      aspect-ratio: 3 / 4;
      overflow: hidden;
      background: #f5f5f5;
    }
    .outfit-collage-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    /* Single item: full width */
    .outfit-collage.items-1 { grid-template-columns: 1fr; }
    .outfit-collage.items-1 .outfit-collage-item { aspect-ratio: 3 / 3; }
    /* 3 items: first full-width, two below */
    .outfit-collage.items-3 { grid-template-columns: repeat(2, 1fr); }
    .outfit-collage.items-3 .outfit-collage-item:first-child {
      grid-column: 1 / -1;
      aspect-ratio: 3 / 2;
    }
    .outfit-card-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 40px 14px 14px;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
      pointer-events: none;
    }
    .outfit-card-name {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 4px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }
    .outfit-card-desc {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.5px;
      color: #fff;
      line-height: 1.5;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    .no-items {
      font-size: 12px;
      font-weight: 300;
      color: #aaa;
      letter-spacing: 1px;
      padding: 32px 0;
      text-align: center;
    }

    /* ── Footer ──────────────────────────────────── */
    .footer {
      margin-top: auto;
      border-top: 1px solid #eee;
      padding: 28px;
      text-align: center;
    }

    .footer-text {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #bbb;
    }

    /* ── Responsive ──────────────────────────────── */
    @media (max-width: 440px) {
      body { padding: 0; }
      .phone-frame {
        width: 100%;
        min-height: 100vh;
        border-radius: 0;
        box-shadow: none;
      }
      .phone-frame::before { display: none; }
      .nav { padding-top: 16px; }
    }
  </style>
</head>
<body>

  <div class="phone-frame">

  <!-- ── Nav ──────────────────────────────────────── -->
  <nav class="nav">
    <a href="/" class="nav-brand">{{ app_name }}</a>
    <ul class="nav-links">
      <li><a href="/collection" class="active">Collection</a></li>
    </ul>
  </nav>

  <!-- ── Upload ──────────────────────────────────── -->
  <section class="upload-section">
    <input type="file" id="file-input" accept="image/*" multiple>
    <button class="upload-btn" id="upload-btn">Upload</button>
    <p class="file-count" id="file-count"></p>
    <button class="analyze-btn" id="analyze-btn" disabled>Analyze Catalog</button>
    <div class="upload-loader" id="upload-loader">
      <div class="spinner"></div>
      <span class="loader-text">Analyzing garments</span>
    </div>
    <div class="success-section" id="success-section">
      <div class="success-icon">&#10003;</div>
      <p class="success-title">Analysis Complete</p>
      <p class="success-sub" id="success-sub"></p>
    </div>
  </section>

  <!-- ── Page Header ──────────────────────────────── -->
  <div class="page-header">
    <h1 class="page-title">Collection</h1>
    <p class="page-subtitle" id="item-count"></p>
    <hr class="page-divider">
  </div>

  <!-- ── Siri Orb ────────────────────────────────── -->
  <button class="siri-orb" id="siri-orb" title="Search"></button>

  <!-- ── Search Popup ───────────────────────────── -->
  <div class="search-overlay" id="search-overlay">
    <div class="search-popup">
      <p class="search-popup-label">Search Collection</p>
      <input type="text" class="search-popup-input" id="search-input" placeholder="Describe what you're looking for...">
      <div id="camera-container" style="display:none;">
        <video id="camera-video" autoplay playsinline style="width:100%; border-radius:8px; background:#000;"></video>
        <canvas id="camera-canvas" style="display:none;"></canvas>
        <p id="camera-countdown" style="margin-top:10px; font-size:11px; font-weight:300; letter-spacing:2px; text-transform:uppercase; color:#999; text-align:center;"></p>
      </div>
      <p class="search-popup-status" id="search-status"></p>
      <p class="search-popup-hint">Tap orb to listen &middot; Enter to search &middot; Esc to close</p>
    </div>
  </div>

  <!-- ── Content ──────────────────────────────────── -->
  <div class="collection" id="collection-content">
    <div class="loader" id="loader">
      <div class="spinner"></div>
      <span class="loader-text">Loading collection</span>
    </div>
  </div>

  <!-- ── Footer ───────────────────────────────────── -->
  <footer class="footer">
    <p class="footer-text">&copy; 2026 {{ app_name | capitalize }}</p>
  </footer>

  </div><!-- .phone-frame -->

  <script>
    const content   = document.getElementById('collection-content');
    const loader    = document.getElementById('loader');
    const itemCount = document.getElementById('item-count');

    async function loadCollection() {
      try {
        const res  = await fetch('/api/v1/catalog/collection');
        const data = await res.json();
        content.innerHTML = '';
        renderCollection(data.collection);
      } catch (err) {
        console.error(err);
        content.innerHTML = '<p class="no-items">Failed to load collection.</p>';
      }
    }

    function renderCollection(collection) {
      if (!collection || collection.length === 0) {
        content.innerHTML = `
          <div class="empty-state">
            <p class="empty-title">No items in your collection yet</p>
            <a href="#" class="empty-cta">Upload your first garment</a>
          </div>`;
        itemCount.textContent = '0 items';
        return;
      }

      const totalCrops = collection.reduce((sum, job) => sum + (job.crops ? job.crops.length : 0), 0);
      itemCount.textContent = `${totalCrops} item${totalCrops !== 1 ? 's' : ''} \u00b7 ${collection.length} upload${collection.length !== 1 ? 's' : ''}`;

      collection.forEach((job, idx) => {
        const group = document.createElement('div');
        group.className = 'job-group';


        // Crops
        const crops = job.crops || [];
        if (crops.length === 0) {
          const empty = document.createElement('p');
          empty.className = 'no-items';
          empty.textContent = 'No garments detected';
          group.appendChild(empty);
        } else {
          const grid = document.createElement('div');
          grid.className = 'crops-grid';

          crops.filter(crop => crop.generated_url).forEach(crop => {
            const card = document.createElement('div');
            card.className = 'crop-card';
            card.dataset.cropId = crop.id;

            // Image
            const imgWrap = document.createElement('div');
            imgWrap.className = 'crop-img-wrap';

            const img = document.createElement('img');
            img.src = crop.generated_url;
            img.alt = crop.label || 'Clothing item';
            img.loading = 'lazy';
            imgWrap.appendChild(img);

            card.appendChild(imgWrap);

            // Info
            const info = document.createElement('div');
            info.className = 'crop-info';

            const lbl = document.createElement('div');
            lbl.className = 'crop-label';
            const m = crop.metadata || {};
            const typeName = (!m.error && m.type) ? m.type : (crop.label || 'Item');
            const conf = crop.confidence != null ? Math.round(crop.confidence * 100) : '\u2014';
            lbl.innerHTML = `<span>${typeName}</span><span class="crop-conf">${conf}%</span>`;
            info.appendChild(lbl);

            // Metadata
            const metaEl = document.createElement('div');
            metaEl.className = 'crop-meta';
            if (m.error) {
              metaEl.classList.add('crop-meta-error');
              metaEl.textContent = 'Metadata unavailable';
            } else {
              const parts = [];
              if (Array.isArray(m.color) && m.color.length) parts.push(m.color.join(', '));
              if (m.material) parts.push(m.material);
              if (m.pattern && m.pattern !== 'solid') parts.push(m.pattern);
              if (m.style) parts.push(m.style);
              metaEl.textContent = parts.join(' / ');
              card.title = JSON.stringify(m, null, 2);
            }
            info.appendChild(metaEl);

            card.appendChild(info);
            grid.appendChild(card);
          });

          group.appendChild(grid);
        }

        content.appendChild(group);

        // Staggered fade-in
        setTimeout(() => group.classList.add('visible'), idx * 150);
      });
    }

    loadCollection();

    // ── Upload Logic ──────────────────────────────
    const uploadBtn    = document.getElementById('upload-btn');
    const fileInput    = document.getElementById('file-input');
    const fileCountEl  = document.getElementById('file-count');
    const analyzeBtn   = document.getElementById('analyze-btn');
    const uploadLoader = document.getElementById('upload-loader');
    const successEl    = document.getElementById('success-section');
    const successSub   = document.getElementById('success-sub');

    let selectedFiles = [];

    uploadBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      selectedFiles = Array.from(e.target.files);
      if (selectedFiles.length > 0) {
        fileCountEl.textContent = `${selectedFiles.length} file${selectedFiles.length > 1 ? 's' : ''} selected`;
        fileCountEl.style.display = 'block';
        analyzeBtn.style.display = 'block';
        analyzeBtn.disabled = false;
      }
    });

    analyzeBtn.addEventListener('click', async () => {
      if (!selectedFiles.length) return;

      analyzeBtn.disabled = true;
      analyzeBtn.style.display = 'none';
      uploadLoader.classList.add('active');
      successEl.classList.remove('visible');

      const formData = new FormData();
      selectedFiles.forEach(f => formData.append('files', f));

      try {
        const res  = await fetch('/api/v1/catalog/analyze', { method: 'POST', body: formData });
        const data = await res.json();

        const totalCrops = data.results.reduce((sum, r) => sum + (r.crops ? r.crops.length : 0), 0);
        successSub.textContent = `${totalCrops} item${totalCrops !== 1 ? 's' : ''} detected and cataloged`;
        successEl.querySelector('.success-icon').textContent = '\u2713';
        successEl.querySelector('.success-title').textContent = 'Analysis Complete';
        successEl.classList.add('visible');

        // Play voice feedback
        try {
          const feedbackMsg = `Analysis complete. ${totalCrops} item${totalCrops !== 1 ? 's' : ''} detected and cataloged.`;
          const audioRes = await fetch('/api/v1/voice/feedback', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: feedbackMsg }),
          });
          if (audioRes.ok) {
            const blob = await audioRes.blob();
            const url = URL.createObjectURL(blob);
            const feedbackAudio = new Audio(url);
            feedbackAudio.addEventListener('ended', () => URL.revokeObjectURL(url));
            feedbackAudio.play();
          }
        } catch (audioErr) {
          console.error('Audio feedback failed:', audioErr);
        }

        // Reload collection to show new items
        content.innerHTML = '<div class="loader" id="loader"><div class="spinner"></div><span class="loader-text">Loading collection</span></div>';
        await loadCollection();
      } catch (err) {
        console.error(err);
        successSub.textContent = 'Analysis failed. Please try again.';
        successEl.querySelector('.success-icon').textContent = '!';
        successEl.querySelector('.success-title').textContent = 'Error';
        successEl.classList.add('visible');
      } finally {
        uploadLoader.classList.remove('active');
        fileCountEl.style.display = 'none';
        selectedFiles = [];
        fileInput.value = '';
        analyzeBtn.style.display = 'none';
      }
    });

    // ── Siri Orb + Voice + Search ────────────────
    const siriOrb = document.getElementById('siri-orb');
    const searchOverlay = document.getElementById('search-overlay');
    const searchInput = document.getElementById('search-input');
    const searchStatus = document.getElementById('search-status');
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;

    function openSearch() {
      searchOverlay.classList.add('visible');
      siriOrb.classList.add('active');
    }

    function closeSearch() {
      searchOverlay.classList.remove('visible');
      siriOrb.classList.remove('active');
      siriOrb.classList.remove('recording');
      searchStatus.textContent = '';
      if (isRecording && mediaRecorder) {
        mediaRecorder.stop();
      }
      if (typeof resetCameraUI === 'function') resetCameraUI();
      if (!searchInput.value.trim()) showAllItems();
    }

    // Orb click: start or stop recording
    siriOrb.addEventListener('click', async () => {
      // If recording, stop it
      if (isRecording) {
        mediaRecorder.stop();
        return;
      }

      // Open popup and greet
      openSearch();
      searchInput.value = '';
      searchStatus.textContent = 'Listening...';
      siriOrb.classList.add('recording');

      // Play greeting
      try {
        const greetRes = await fetch('/api/v1/voice/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: 'Hey there, what can I do for you?' }),
        });
        if (greetRes.ok) {
          const blob = await greetRes.blob();
          const url = URL.createObjectURL(blob);
          const greetAudio = new Audio(url);
          greetAudio.addEventListener('ended', () => URL.revokeObjectURL(url));
          greetAudio.play();
        }
      } catch (e) { console.error('Greeting failed:', e); }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
          ? 'audio/webm;codecs=opus'
          : 'audio/mp4';
        mediaRecorder = new MediaRecorder(stream, { mimeType });
        audioChunks = [];

        mediaRecorder.addEventListener('dataavailable', (e) => {
          if (e.data.size > 0) audioChunks.push(e.data);
        });

        mediaRecorder.addEventListener('stop', async () => {
          isRecording = false;
          siriOrb.classList.remove('recording');
          siriOrb.classList.add('active');
          stream.getTracks().forEach(t => t.stop());

          searchStatus.textContent = 'Transcribing...';

          const audioBlob = new Blob(audioChunks, { type: mimeType });
          const formData = new FormData();
          formData.append('file', audioBlob, 'recording.webm');

          try {
            const res = await fetch('/api/v1/voice/transcribe', {
              method: 'POST',
              body: formData,
            });
            const data = await res.json();
            searchInput.value = data.text || '';
            if (data.text) {
              if (isOutfitCheckIntent(data.text)) {
                const imageBlob = await activateCameraAndCapture();
                if (imageBlob) await outfitCheck(imageBlob, data.text);
              } else if (isVisualIntent(data.text)) {
                const imageBlob = await activateCameraAndCapture();
                if (imageBlob) await visualMatch(imageBlob);
              } else {
                await filterCollection(data.text);
              }
            } else {
              searchStatus.textContent = '';
            }
          } catch (err) {
            console.error('Transcription error:', err);
            searchInput.value = '';
            searchStatus.textContent = 'Transcription failed';
            setTimeout(() => { searchStatus.textContent = ''; }, 2000);
          }
        });

        mediaRecorder.start();
        isRecording = true;
      } catch (err) {
        console.error('Microphone access denied:', err);
        searchStatus.textContent = 'Mic access denied';
        siriOrb.classList.remove('recording');
        setTimeout(() => { searchStatus.textContent = ''; }, 2000);
      }
    });

    searchOverlay.addEventListener('click', (e) => {
      if (e.target === searchOverlay) closeSearch();
    });

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        searchInput.value = '';
        closeSearch();
        showAllItems();
      }
      if (e.key === 'Enter') {
        const q = searchInput.value.trim();
        if (q) filterCollection(q);
        else showAllItems();
        closeSearch();
      }
    });

    let searchTimeout = null;
    searchInput.addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      const q = e.target.value.trim();
      if (!q) { showAllItems(); return; }
      searchTimeout = setTimeout(() => filterCollection(q), 500);
    });

    let savedCollectionHTML = null;

    function showAllItems() {
      if (savedCollectionHTML) {
        content.innerHTML = savedCollectionHTML;
        savedCollectionHTML = null;
        // Re-trigger fade-in
        document.querySelectorAll('.job-group').forEach((g, i) => {
          g.classList.remove('visible');
          setTimeout(() => g.classList.add('visible'), i * 150);
        });
      } else {
        document.querySelectorAll('.crop-card').forEach(c => c.style.display = '');
        document.querySelectorAll('.job-group').forEach(g => g.style.display = '');
      }
    }

    // ── Intent Detection + Webcam ─────────────────
    function isOutfitCheckIntent(text) {
      const lower = text.toLowerCase();
      const patterns = [
        'appropriate', 'suitable', 'right for', 'good for',
        'okay for', 'ok for', 'dress code', 'overdressed',
        'underdressed', 'too casual', 'too formal', 'is this fine',
        'does this work', 'can i wear this to', 'should i wear',
        'is my outfit', 'how do i look', 'do i look'
      ];
      return patterns.some(p => lower.includes(p));
    }

    function isVisualIntent(text) {
      const lower = text.toLowerCase();
      const patterns = [
        'this outfit', 'what i\'m wearing', 'what am i wearing',
        'do i have this', 'match this', 'match what', 'wearing this',
        'this look', 'my outfit', 'match my', 'find this',
        'have this look', 'similar to this', 'camera', 'take a photo',
        'take a picture', 'show you', 'let me show', 'look at me',
        'look at this', 'see this', 'look like this'
      ];
      return patterns.some(p => lower.includes(p));
    }

    let cameraStream = null;

    async function activateCameraAndCapture() {
      const container = document.getElementById('camera-container');
      const video = document.getElementById('camera-video');
      const canvas = document.getElementById('camera-canvas');
      const countdown = document.getElementById('camera-countdown');

      // Hide search input, show camera
      searchInput.style.display = 'none';
      document.querySelector('.search-popup-hint').style.display = 'none';
      container.style.display = 'block';

      // Voice feedback
      try {
        const audioRes = await fetch('/api/v1/voice/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: 'Let me take a look at what you\'re wearing.' }),
        });
        if (audioRes.ok) {
          const blob = await audioRes.blob();
          const url = URL.createObjectURL(blob);
          const a = new Audio(url);
          a.addEventListener('ended', () => URL.revokeObjectURL(url));
          a.play();
        }
      } catch (e) { console.error('Camera voice feedback failed:', e); }

      // Start webcam
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
        });
        video.srcObject = cameraStream;
        await video.play();
      } catch (err) {
        console.error('Camera access denied:', err);
        searchStatus.textContent = 'Camera access denied';
        resetCameraUI();
        return null;
      }

      // Countdown
      for (let i = 5; i >= 1; i--) {
        countdown.textContent = i === 5 ? 'Hold still...' : `${i}...`;
        await new Promise(r => setTimeout(r, 1000));
      }
      countdown.textContent = 'Captured!';

      // Capture frame
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);

      // Stop camera
      cameraStream.getTracks().forEach(t => t.stop());
      cameraStream = null;

      return new Promise(resolve => {
        canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.85);
      });
    }

    function resetCameraUI() {
      const container = document.getElementById('camera-container');
      const video = document.getElementById('camera-video');
      const countdown = document.getElementById('camera-countdown');
      container.style.display = 'none';
      searchInput.style.display = '';
      document.querySelector('.search-popup-hint').style.display = '';
      countdown.textContent = '';
      video.srcObject = null;
      if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = null;
      }
    }

    async function visualMatch(imageBlob) {
      searchStatus.textContent = 'Matching your outfit...';

      try {
        if (savedCollectionHTML) {
          content.innerHTML = savedCollectionHTML;
          savedCollectionHTML = null;
        }

        const formData = new FormData();
        formData.append('file', imageBlob, 'webcam.jpg');

        const res = await fetch('/api/v1/catalog/visual-match', {
          method: 'POST',
          body: formData,
        });
        const data = await res.json();
        const outfits = data.outfits || [];

        if (outfits.length > 0) {
          renderOutfits(outfits);
        } else {
          if (!savedCollectionHTML) savedCollectionHTML = content.innerHTML;
          content.innerHTML = '<p class="no-items">No matching outfits found in your collection.</p>';
        }
      } catch (err) {
        console.error('Visual match error:', err);
      } finally {
        searchStatus.textContent = '';
        resetCameraUI();
        closeSearch();
      }
    }

    async function outfitCheck(imageBlob, query) {
      searchStatus.textContent = 'Checking your outfit...';

      try {
        const formData = new FormData();
        formData.append('file', imageBlob, 'webcam.jpg');
        formData.append('query', query);

        const res = await fetch('/api/v1/catalog/outfit-check', {
          method: 'POST',
          body: formData,
        });
        const data = await res.json();
        const assessment = data.assessment || 'I couldn\'t assess your outfit.';

        // Speak the assessment via ElevenLabs
        try {
          const audioRes = await fetch('/api/v1/voice/feedback', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: assessment }),
          });
          if (audioRes.ok) {
            const blob = await audioRes.blob();
            const url = URL.createObjectURL(blob);
            const a = new Audio(url);
            a.addEventListener('ended', () => URL.revokeObjectURL(url));
            a.play();
          }
        } catch (e) { console.error('Assessment TTS failed:', e); }
      } catch (err) {
        console.error('Outfit check error:', err);
      } finally {
        searchStatus.textContent = '';
        resetCameraUI();
        closeSearch();
      }
    }

    function renderOutfits(outfits) {
      // Save original collection HTML only once
      if (!savedCollectionHTML) savedCollectionHTML = content.innerHTML;

      // Build image map from saved HTML before clearing
      const allImages = new Map();
      const temp = document.createElement('div');
      temp.innerHTML = savedCollectionHTML;
      temp.querySelectorAll('.crop-card').forEach(c => {
        const img = c.querySelector('img');
        if (img) allImages.set(c.dataset.cropId, { src: img.src, alt: img.alt });
      });

      content.innerHTML = '';

      const grid = document.createElement('div');
      grid.className = 'outfits-grid';

      outfits.forEach((outfit, idx) => {
        const card = document.createElement('div');
        card.className = 'outfit-card';

        // Collage of item images
        const items = (outfit.items || []).filter(id => allImages.has(id));
        const collage = document.createElement('div');
        const count = Math.min(items.length, 4);
        collage.className = `outfit-collage items-${count}`;

        items.slice(0, 4).forEach(id => {
          const data = allImages.get(id);
          const cell = document.createElement('div');
          cell.className = 'outfit-collage-item';
          const img = document.createElement('img');
          img.src = data.src;
          img.alt = data.alt;
          img.loading = 'lazy';
          cell.appendChild(img);
          collage.appendChild(cell);
        });

        card.appendChild(collage);

        // Info
        const info = document.createElement('div');
        info.className = 'outfit-card-info';
        info.innerHTML = `<div class="outfit-card-name">${outfit.name}</div><div class="outfit-card-desc">${outfit.description || ''}</div>`;
        card.appendChild(info);

        grid.appendChild(card);
        setTimeout(() => card.classList.add('visible'), idx * 150);
      });

      content.appendChild(grid);
    }

    async function filterCollection(query) {
      searchInput.style.borderColor = '#999';
      searchStatus.textContent = 'Thinking...';

      // Play voice feedback while searching
      try {
        const audioRes = await fetch('/api/v1/voice/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: 'Please wait while I curate outfits for you.' }),
        });
        if (audioRes.ok) {
          const blob = await audioRes.blob();
          const url = URL.createObjectURL(blob);
          const feedbackAudio = new Audio(url);
          feedbackAudio.addEventListener('ended', () => URL.revokeObjectURL(url));
          feedbackAudio.play();
        }
      } catch (e) { console.error('Voice feedback failed:', e); }

      try {
        // Restore original collection before new search
        if (savedCollectionHTML) {
          content.innerHTML = savedCollectionHTML;
          savedCollectionHTML = null;
        }

        const res = await fetch('/api/v1/catalog/outfits', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query }),
        });
        const data = await res.json();
        const outfits = data.outfits || [];

        // Single "Search Results" group → flat filter mode
        if (outfits.length === 1 && outfits[0].name === 'Search Results') {
          const matchIds = new Set(outfits[0].items || []);
          document.querySelectorAll('.crop-card').forEach(card => {
            card.style.display = matchIds.has(card.dataset.cropId) ? '' : 'none';
          });
          document.querySelectorAll('.job-group').forEach(group => {
            const visibleCards = group.querySelectorAll('.crop-card:not([style*="display: none"])');
            group.style.display = visibleCards.length > 0 ? '' : 'none';
          });
        } else if (outfits.length > 0) {
          renderOutfits(outfits);
        }
      } catch (err) {
        console.error('Search error:', err);
      } finally {
        searchInput.style.borderColor = '';
        searchStatus.textContent = '';
        closeSearch();
      }
    }
  </script>

</body>
</html>
