<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>{{ app_name | capitalize }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; height: 100%; }

    body {
      background: #000;
      color: #111;
      font-family: 'Helvetica Neue', Helvetica, Arial, 'Inter', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      min-height: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 0;
    }

    /* ── Phone Frame ─────────────────────────────── */
    .phone-frame {
      width: 402px;
      height: min(874px, 95vh);
      background: #fff;
      border-radius: 48px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 0 3px #1a1a1a, 0 0 0 6px #333, 0 20px 60px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
    }

    /* Dynamic Island */
    .phone-frame::before {
      content: '';
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 36px;
      background: #000;
      border-radius: 20px;
      z-index: 200;
    }

    /* ── Nav ──────────────────────────────────────── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 56px 20px 14px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .nav-brand {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #111;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 24px;
      list-style: none;
    }

    .nav-links a {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #555;
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: #111; }

    /* ── Hero ─────────────────────────────────────── */
    .hero {
      padding: 72px 24px 48px;
      text-align: center;
    }

    .hero-title {
      font-size: 42px;
      font-weight: 200;
      letter-spacing: -0.02em;
      line-height: 1.02;
      text-transform: uppercase;
      color: #111;
      margin-bottom: 16px;
    }

    .hero-sub {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 40px;
    }

    /* ── Footer ──────────────────────────────────── */
    .footer {
      margin-top: auto;
      border-top: 1px solid #eee;
      padding: 28px;
      text-align: center;
    }

    .footer-text {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #bbb;
    }

    /* ── Responsive ──────────────────────────────── */
    @media (max-width: 440px) {
      body { padding: 0; }
      .phone-frame {
        width: 100%;
        min-height: 100vh;
        border-radius: 0;
        box-shadow: none;
      }
      .phone-frame::before { display: none; }
      .nav { padding-top: 16px; }
    }
  </style>
</head>
<body>

  <div class="phone-frame">

  <!-- ── Nav ──────────────────────────────────────── -->
  <nav class="nav">
    <a href="/" class="nav-brand">{{ app_name }}</a>
    <ul class="nav-links">
      <li><a href="/collection">Collection</a></li>
    </ul>
  </nav>

  <!-- ── Hero ──────────────────────────────────────── -->
  <section class="hero">
    <h1 class="hero-title">Your<br>Wardrobe,<br>Cataloged.</h1>
    <p class="hero-sub">AI-powered garment detection</p>
  </section>

  <!-- ── Footer ────────────────────────────────────── -->
  <footer class="footer">
    <p class="footer-text">&copy; 2026 {{ app_name | capitalize }}</p>
  </footer>

  </div><!-- .phone-frame -->


</body>
</html>
